# FX-Range-Master Configuration
# USD/ILS Intraday Mean Reversion Strategy

pair: "USDILS=X"

# Strategy parameters (optimized via backtesting: WR=73%, PF=2.55)
window:
  half_width_pct: 0.3          # ±0.3% around baseline (optimized, was 0.5%)

# Risk management
risk:
  stop_loss_extension_pct: 0.8 # Stop loss 0.8% beyond window boundary (optimized, was 0.2%)

# Scanning
scan:
  interval_seconds: 60         # How often to check the price
  data_interval: "1m"          # yfinance data interval

# Market hours (Israel time, UTC+2 / UTC+3 DST)
market:
  timezone: "Asia/Jerusalem"
  open_hour: 8
  open_minute: 0
  close_hour: 17
  close_minute: 30

# News sentiment monitor (optional)
# Get a free API key from https://newsapi.org (100 req/day)
# newsapi_key: "your-api-key-here"

# Firebase Authentication (optional -- app runs without auth if not configured)
# Setup steps:
#   1. Go to https://console.firebase.google.com → Create project
#   2. Enable Authentication → Sign-in method → Email/Password + Google
#   3. Enable Multi-factor auth (MFA) in Authentication → Settings
#   4. Project Settings → General → Your apps → Add Web App → copy config below
#   5. Project Settings → Service accounts → Generate new private key
#      → save as firebase-service-account.json in project root
#   6. Add your email to admin_emails list below
